<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>韩股双子星看板 | 三星电子 × SK海力士</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: rgba(255,255,255,0.9);
      --text: #14213d;
      --muted: #667085;
      --up: #d92d20;
      --down: #1570ef;
      --flat: #475467;
      --line: rgba(15, 23, 42, 0.08);
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, #eef4ff 36%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }
    .hero {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .title {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .pill {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.78);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      backdrop-filter: blur(10px);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow);
      border-radius: 24px;
      padding: 22px;
      backdrop-filter: blur(14px);
    }
    .code {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .name-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .status {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(16, 24, 40, 0.05);
      color: var(--muted);
    }
    .price {
      font-size: clamp(38px, 5vw, 60px);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin: 10px 0 6px;
    }
    .change {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 18px;
    }
    .up { color: var(--up); }
    .down { color: var(--down); }
    .flat { color: var(--flat); }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .stat {
      padding: 14px 14px 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(248, 250, 252, 0.8);
    }
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .spark-wrap {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(246,248,252,0.92));
    }
    .spark-title {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }
    svg { width: 100%; height: 96px; display: block; }
    .spark-labels {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }
    .chart-wrap {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(246,248,252,0.96));
    }
    .chart-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }
    .chart-title {
      color: var(--muted);
      font-size: 12px;
    }
    .chip-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
    }
    .chip.active {
      background: #14213d;
      border-color: #14213d;
      color: #fff;
    }
    .chart-image {
      width: 100%;
      aspect-ratio: 700 / 289;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      display: block;
    }
    .chart-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
    .error {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      color: #b42318;
      background: #fef3f2;
      border: 1px solid #fecdca;
      display: none;
    }
    @media (max-width: 880px) {
      .grid { grid-template-columns: 1fr; }
      .meta { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div>
        <h1 class="title">韩股双子星实时看板</h1>
        <div class="subtitle">Naver Finance 数据源，默认每 15 秒刷新一次。盯住三星电子和 SK 海力士的即时价格、日内涨跌，以及相对上次刷新的跳动。</div>
      </div>
      <div class="meta">
        <div class="pill" id="source-pill">数据源：Naver Finance</div>
        <div class="pill" id="refresh-pill">刷新频率：15 秒</div>
        <div class="pill" id="snapshot-pill">共享快照：15 秒</div>
        <div class="pill" id="update-pill">等待首轮数据…</div>
      </div>
    </section>

    <section class="grid" id="cards"></section>
    <div class="error" id="error-box"></div>
    <div class="footer">说明：看板展示的是韩股原始价格（KRW）。“较上次刷新”用于观察 15 秒级别的微小跳动，不等于当日涨跌。“当日涨跌”来自 Naver Finance 实时接口。</div>
  </div>

  <template id="card-template">
    <article class="card">
      <div class="code"></div>
      <div class="name-row">
        <div class="name"></div>
        <div class="status"></div>
      </div>
      <div class="price"></div>
      <div class="change">
        <span class="day-change"></span>
        <span class="refresh-change"></span>
      </div>
      <div class="mini-grid">
        <div class="stat"><div class="stat-label">开盘</div><div class="stat-value open"></div></div>
        <div class="stat"><div class="stat-label">前收</div><div class="stat-value previous-close"></div></div>
        <div class="stat"><div class="stat-label">日内高</div><div class="stat-value high"></div></div>
        <div class="stat"><div class="stat-label">日内低</div><div class="stat-value low"></div></div>
      </div>
      <div class="spark-wrap">
        <div class="spark-title">近 30 次刷新价格轨迹</div>
        <svg viewBox="0 0 320 96" preserveAspectRatio="none">
          <path class="sparkline" fill="none" stroke-width="3" stroke-linecap="round"></path>
        </svg>
        <div class="spark-labels">
          <span class="spark-min"></span>
          <span class="spark-max"></span>
        </div>
      </div>
      <div class="chart-wrap">
        <div class="chart-toolbar">
          <div class="chart-title">Naver Finance 原生图表</div>
          <div class="chip-group chart-type-group">
            <button class="chip active" data-kind="type" data-value="area">分时线</button>
            <button class="chip" data-kind="type" data-value="candle">K线</button>
          </div>
          <div class="chip-group chart-range-group">
            <button class="chip active" data-kind="range" data-value="day">日内</button>
            <button class="chip" data-kind="range" data-value="week">周线</button>
            <button class="chip" data-kind="range" data-value="month">月线</button>
          </div>
        </div>
        <img class="chart-image" alt="chart" />
        <div class="chart-note">图像来自 Naver Finance，页面每次刷新会自动加时间戳避免缓存。</div>
      </div>
    </article>
  </template>

  <script>
    const API_URL = '/api/naver/realtime?codes=000660,005930';
    const REFRESH_MS = 15000;
    const CARD_ORDER = ['000660', '005930'];
    const historyMap = new Map();
    const previousMap = new Map();
    const cardsEl = document.getElementById('cards');
    const tpl = document.getElementById('card-template');
    const updatePill = document.getElementById('update-pill');
    const errorBox = document.getElementById('error-box');
    const snapshotPill = document.getElementById('snapshot-pill');

    function fmtNumber(value) {
      return new Intl.NumberFormat('en-US').format(Math.round(value || 0));
    }

    function fmtSigned(value) {
      const n = Math.round(value || 0);
      return `${n > 0 ? '+' : ''}${fmtNumber(n)}`;
    }

    function fmtPct(value) {
      const n = Number(value || 0);
      return `${n > 0 ? '+' : ''}${n.toFixed(2)}%`;
    }

    function getDirectionClass(value) {
      if (value > 0) return 'up';
      if (value < 0) return 'down';
      return 'flat';
    }

    function marketLabel(status) {
      if (status === 'OPEN') return '交易中';
      if (status === 'CLOSE') return '已收盘';
      return status || '未知';
    }

    function relativeTime(ts) {
      if (!ts) return '刚刚更新';
      const diff = Math.max(0, Date.now() - new Date(ts).getTime());
      const sec = Math.round(diff / 1000);
      if (sec < 5) return '刚刚更新';
      if (sec < 60) return `${sec} 秒前更新`;
      const min = Math.round(sec / 60);
      return `${min} 分钟前更新`;
    }

    function buildPath(values) {
      if (!values.length) return '';
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      return values.map((value, index) => {
        const x = values.length === 1 ? 160 : (index / (values.length - 1)) * 320;
        const y = 88 - ((value - min) / range) * 80;
        return `${index === 0 ? 'M' : 'L'} ${x.toFixed(2)} ${y.toFixed(2)}`;
      }).join(' ');
    }

    function chartUrl(code, type, range) {
      return `https://ssl.pstatic.net/imgfinance/chart/item/${type}/${range}/${code}.png?sidcode=${Date.now()}`;
    }

    function updateChart(card) {
      const code = card.dataset.code;
      const type = card.dataset.chartType || 'area';
      const range = card.dataset.chartRange || 'day';
      const img = card.querySelector('.chart-image');
      img.src = chartUrl(code, type, range);
      img.alt = `${code} ${type} ${range}`;
    }

    function bindChartControls(card) {
      card.querySelectorAll('.chip').forEach((chip) => {
        chip.addEventListener('click', () => {
          const kind = chip.dataset.kind;
          const value = chip.dataset.value;
          if (kind === 'type') {
            card.dataset.chartType = value;
            card.querySelectorAll('[data-kind="type"]').forEach((el) => el.classList.toggle('active', el === chip));
          }
          if (kind === 'range') {
            card.dataset.chartRange = value;
            card.querySelectorAll('[data-kind="range"]').forEach((el) => el.classList.toggle('active', el === chip));
          }
          updateChart(card);
        });
      });
    }

    function ensureCard(code) {
      let card = document.querySelector(`[data-code="${code}"]`);
      if (card) return card;
      card = tpl.content.firstElementChild.cloneNode(true);
      card.dataset.code = code;
      card.dataset.chartType = 'area';
      card.dataset.chartRange = 'day';
      bindChartControls(card);
      const orderIndex = CARD_ORDER.indexOf(code);
      const children = [...cardsEl.children];
      const before = children.find((el) => CARD_ORDER.indexOf(el.dataset.code) > orderIndex);
      if (before) cardsEl.insertBefore(card, before);
      else cardsEl.appendChild(card);
      return card;
    }

    function renderQuote(quote) {
      const card = ensureCard(quote.code);
      const previous = previousMap.get(quote.code);
      const tickChange = previous ? quote.current - previous.current : 0;
      previousMap.set(quote.code, quote);

      const history = historyMap.get(quote.code) || [];
      history.push(quote.current);
      if (history.length > 30) history.shift();
      historyMap.set(quote.code, history);

      card.querySelector('.code').textContent = `${quote.code} · KRX`;
      card.querySelector('.name').textContent = quote.name;
      card.querySelector('.status').textContent = quote.unavailable ? '暂不可用' : marketLabel(quote.market);
      card.querySelector('.price').textContent = quote.unavailable ? '加载失败' : fmtNumber(quote.current);

      const dayEl = card.querySelector('.day-change');
      dayEl.className = `day-change ${getDirectionClass(quote.dayChange)}`;
      dayEl.textContent = quote.unavailable ? '当日数据暂不可用' : `当日涨跌 ${fmtSigned(quote.dayChange)} · ${fmtPct(quote.dayChangePercent)}`;

      const tickEl = card.querySelector('.refresh-change');
      tickEl.className = `refresh-change ${getDirectionClass(tickChange)}`;
      tickEl.textContent = quote.unavailable ? '等待下一轮快照' : (previous ? `较上次刷新 ${fmtSigned(tickChange)}` : '首轮抓取');

      card.querySelector('.open').textContent = fmtNumber(quote.open);
      card.querySelector('.previous-close').textContent = fmtNumber(quote.previousClose);
      card.querySelector('.high').textContent = fmtNumber(quote.high);
      card.querySelector('.low').textContent = fmtNumber(quote.low);

      const path = buildPath(history);
      const directionClass = getDirectionClass(quote.dayChange);
      const stroke = directionClass === 'up' ? '#d92d20' : directionClass === 'down' ? '#1570ef' : '#475467';
      const spark = card.querySelector('.sparkline');
      spark.setAttribute('d', path);
      spark.setAttribute('stroke', stroke);
      card.querySelector('.spark-min').textContent = `低点 ${fmtNumber(Math.min(...history))}`;
      card.querySelector('.spark-max').textContent = `高点 ${fmtNumber(Math.max(...history))}`;
      updateChart(card);
    }

    async function refresh() {
      try {
        const resp = await fetch(API_URL, { cache: 'no-store' });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || 'unknown error');
        errorBox.style.display = 'none';
        updatePill.textContent = `最近更新：${relativeTime(data.serverTime)}`;
        if (data.snapshotTtlSeconds) {
          snapshotPill.textContent = `共享快照：${data.snapshotTtlSeconds} 秒`;
        }
        for (const quote of data.quotes) renderQuote(quote);
      } catch (error) {
        errorBox.textContent = `刷新失败：${error.message}`;
        errorBox.style.display = 'block';
      }
    }

    refresh();
    setInterval(refresh, REFRESH_MS);
    setInterval(() => {
      const pill = document.getElementById('update-pill');
      const current = pill.textContent;
      if (current.startsWith('最近更新：')) {
        const ts = previousMap.get('005930')?.fetchedAt || previousMap.get('000660')?.fetchedAt;
        if (ts) pill.textContent = `最近更新：${relativeTime(ts)}`;
      }
    }, 1000);
  </script>
</body>
</html>
