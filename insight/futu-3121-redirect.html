<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>正在前往富途交易页</title>
  <meta http-equiv="refresh" content="1; url=https://www.futunn.com/etfs/03121-HK" />
  <style>
    :root{--bg:#f5f8fd;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#dbe3ef;--blue:#2563eb;--shadow:0 18px 40px rgba(15,23,42,.08)}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#fbfdff 0%,#edf4ff 100%);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
    .card{width:min(560px,100%);background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:28px 22px;text-align:center}
    .eyebrow{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef5ff;color:var(--blue);font-size:12px;font-weight:800}
    h1{margin:14px 0 8px;font-size:28px;line-height:1.2}
    p{margin:0;color:var(--muted);font-size:14px;line-height:1.75}
    .link{display:inline-flex;align-items:center;justify-content:center;margin-top:16px;padding:12px 16px;border-radius:14px;background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);color:#fff;text-decoration:none;font-weight:800;font-size:14px}
    .sub{margin-top:10px;font-size:12px;color:#94a3b8}
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">跳转中间页</div>
    <h1>正在前往富途交易页</h1>
    <p>如果没有自动跳转，请点击下面的按钮继续前往。</p>
    <a class="link" id="go-link" href="https://www.futunn.com/etfs/03121-HK" rel="noopener noreferrer">前往富途 03121-HK</a>
  </div>
  <script>
    setTimeout(function(){ window.location.replace('https://www.futunn.com/etfs/03121-HK'); }, 600);
  </script>
</body>
</html>
