<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>一顿分析猛如虎，涨跌全看特朗普</title>
  <style>
    :root{--bg:#f5f7fb;--panel:#ffffff;--panel-soft:#f8fbff;--text:#162033;--muted:#6b7280;--line:#e6ecf5;--accent:#2563eb;--accent-soft:#eaf2ff;--orange:#f36f21;--shadow:0 18px 45px rgba(15,23,42,.08)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#fbfdff 0%,#f3f7fd 100%);color:var(--text)}
    .wrap{width:min(1080px,calc(100vw - 32px));margin:0 auto;padding:28px 0 40px}.hero{background:linear-gradient(180deg,#ffffff 0%,#f9fbff 100%);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:26px 24px 22px;margin-bottom:18px}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:13px;font-weight:700}.eyebrow::before{content:'📰'}
    h1{margin:14px 0 10px;font-size:38px;line-height:1.08;letter-spacing:-.03em}.sub{color:var(--muted);font-size:15px;line-height:1.75;max-width:760px}
    .hero-row{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;flex-wrap:wrap}.hero-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.pill,.toggle-btn{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:13px}.toggle-group{display:flex;gap:8px;flex-wrap:wrap}.toggle-btn{cursor:pointer;transition:.15s ease}.toggle-btn.active{background:#162033;color:#fff;border-color:#162033}
    .stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;min-width:260px}.stat{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px 18px;box-shadow:var(--shadow)}.stat-label{font-size:12px;color:var(--muted)}.stat-value{margin-top:8px;font-size:26px;font-weight:800;letter-spacing:-.03em}.stat-sub{margin-top:6px;font-size:12px;color:var(--muted)}
    .error{display:none;margin:0 0 14px;padding:14px 16px;border-radius:18px;background:#fff4f4;border:1px solid #ffd5d5;color:#b42318}
    .timeline{position:relative;padding-left:34px}.timeline::before{content:'';position:absolute;left:14px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,#cfe0ff 0%,#dce8f8 100%)}
    .item{position:relative;margin-bottom:16px}.item:last-child{margin-bottom:0}.dot{position:absolute;left:-34px;top:24px;width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#4f7cff,#2563eb);box-shadow:0 0 0 5px rgba(37,99,235,.12)}
    .card{background:linear-gradient(180deg,#ffffff 0%,#fbfdff 100%);border:1px solid var(--line);border-radius:24px;padding:18px 18px 16px;box-shadow:var(--shadow)}.card-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .profile{display:flex;gap:12px;align-items:center}.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#f9a14a,#f36f21);color:#fff;font-weight:800;box-shadow:0 10px 24px rgba(243,111,33,.22);overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover}
    .name{font-size:16px;font-weight:800}.handle{margin-top:3px;font-size:12px;color:var(--muted)}.time{font-size:12px;color:var(--muted);white-space:nowrap}.body{margin-top:14px;font-size:16px;line-height:1.8;color:#1f2937;white-space:pre-wrap}.body.is-original{color:#334155}
    .meta{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}.tag{padding:7px 10px;border-radius:999px;background:var(--accent-soft);border:1px solid #d8e6ff;color:#275ccf;font-size:12px;font-weight:700}
    .media{margin-top:14px;display:grid;gap:10px}.media img,.media video{width:100%;border-radius:16px;border:1px solid var(--line);background:#f5f7fb;display:block}.media video{max-height:420px}
    .link-row{margin-top:14px;display:flex;justify-content:space-between;align-items:center;gap:12px}.origin-link{color:var(--orange);text-decoration:none;font-size:13px;font-weight:700}.origin-link::after{content:' ↗'}
    @media (max-width:900px){.hero-row{align-items:flex-start}.stats{width:100%}.timeline{padding-left:26px}.timeline::before{left:10px}.dot{left:-26px}}
    @media (max-width:560px){.wrap{width:calc(100vw - 16px);padding:14px 0 24px}.hero{padding:18px 16px 16px;border-radius:22px;margin-bottom:12px}.eyebrow{font-size:12px;padding:7px 10px}h1{font-size:28px;margin:10px 0 8px}.sub{font-size:14px;line-height:1.68}.hero-meta{gap:8px;margin-top:10px}.pill,.toggle-btn{font-size:12px;padding:7px 10px}.stats{gap:8px}.stat{padding:14px;border-radius:16px}.stat-value{font-size:22px}.timeline{padding-left:22px}.timeline::before{left:8px}.dot{left:-22px;top:20px;width:12px;height:12px;box-shadow:0 0 0 4px rgba(37,99,235,.12)}.card{padding:14px 14px 12px;border-radius:18px}.avatar{width:38px;height:38px}.body{font-size:15px;line-height:1.72}.meta{gap:6px}.tag{font-size:11px;padding:6px 8px}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-row">
        <div>
          <div class="eyebrow">每分钟更新，实时追踪 Trump 发言动态</div>
          <h1>一顿分析猛如虎，涨跌全看特朗普</h1>
          <div class="sub">按时间顺序浏览特朗普最新发言，快速感受一句话如何撬动市场情绪、互动热度和图片视频内容。当前保留最近 20 条，支持中文 / 原文切换，并按分钟级自动更新。</div>
          <div class="hero-meta">
            <div class="pill" id="status-pill">准备载入最新内容…</div>
            <div class="pill">时间线浏览</div>
            <div class="pill">每分钟级更新</div>
            <div class="toggle-group">
              <button class="toggle-btn" data-lang="en">原文</button>
              <button class="toggle-btn active" data-lang="zh">中文</button>
            </div>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><div class="stat-label">最近发言数</div><div class="stat-value" id="count-stat">--</div><div class="stat-sub">默认展示最近 20 条</div></div>
          <div class="stat"><div class="stat-label">最近一条时间</div><div class="stat-value" id="latest-stat">--</div><div class="stat-sub">快速判断当前更新节奏</div></div>
        </div>
      </div>
    </section>
    <div class="error" id="error-box"></div>
    <section class="timeline" id="posts"></section>
  </div>

  <template id="post-template">
    <article class="item">
      <div class="dot"></div>
      <div class="card">
        <div class="card-top">
          <div class="profile">
            <div class="avatar"><img class="avatar-img" alt="avatar" /></div>
            <div>
              <div class="name">Donald J. Trump</div>
              <div class="handle">@realDonaldTrump</div>
            </div>
          </div>
          <div class="time"></div>
        </div>
        <div class="body"></div>
        <div class="meta"></div>
        <div class="media"></div>
        <div class="link-row">
          <div class="counts"></div>
          <a class="origin-link" target="_blank" rel="noopener noreferrer">查看原文</a>
        </div>
      </div>
    </article>
  </template>

  <script>
    const FEED='/api/pulse/trump-truth-archive';
    const REFRESH_MS=120000;
    let currentLang='zh';
    let latestPosts=[];
    const postsEl=document.getElementById('posts');
    const tpl=document.getElementById('post-template');
    const statusPill=document.getElementById('status-pill');
    const countStat=document.getElementById('count-stat');
    const latestStat=document.getElementById('latest-stat');
    const errorBox=document.getElementById('error-box');
    function timeAgo(ts){if(!ts) return '--'; const diff=Math.max(0,Date.now()-new Date(ts).getTime());const min=Math.round(diff/60000);if(min<1)return'刚刚';if(min<60)return `${min} 分钟前`;const hr=Math.round(min/60);if(hr<24)return `${hr} 小时前`;const day=Math.round(hr/24);return `${day} 天前`}
    function formatCount(n){return new Intl.NumberFormat('en-US').format(Number(n||0))}
    function preferredText(post){if(currentLang==='zh') return post.content_zh_cn||post.content||''; return post.content||post.content_zh_cn||''}
    function normalizeMediaUrl(url){if(!url) return ''; if(/^https?:\/\//i.test(url)) return url; if(url.startsWith('/api/truth-social/media/')) return `https://stock.fengle.me${url}`; return url;}
    function bindLangToggle(){document.querySelectorAll('.toggle-btn').forEach(btn=>{btn.addEventListener('click',()=>{currentLang=btn.dataset.lang;document.querySelectorAll('.toggle-btn').forEach(el=>el.classList.toggle('active',el===btn));render(latestPosts);});});}
    function render(posts){latestPosts=posts;postsEl.innerHTML='';countStat.textContent=String(posts.length);latestStat.textContent=posts[0]?.created_at?timeAgo(posts[0].created_at):(posts[0]?.created_at_text||'--');
      posts.forEach(post=>{try{const el=tpl.content.firstElementChild.cloneNode(true);el.querySelector('.time').textContent=post.created_at_text||timeAgo(post.created_at);const body=el.querySelector('.body');body.textContent=preferredText(post);body.classList.toggle('is-original', currentLang==='en');const avatar=el.querySelector('.avatar-img'); if(post.avatar){avatar.src=normalizeMediaUrl(post.avatar); avatar.style.display='block';} else {avatar.style.display='none';}
        const meta=el.querySelector('.meta');[['内容类型','最新发言'],['阅读模式','中文 / 原文切换']].forEach(([a,b])=>{const tag=document.createElement('span');tag.className='tag';tag.textContent=`${a} · ${b}`;meta.appendChild(tag);});
        const counts=el.querySelector('.counts');
        const countParts=[];
        if(post.favourites_count!=null) countParts.push(`👍 ${formatCount(post.favourites_count)}`);
        if(post.reblogs_count!=null) countParts.push(`🔁 ${formatCount(post.reblogs_count)}`);
        if(post.replies_count!=null) countParts.push(`💬 ${formatCount(post.replies_count)}`);
        counts.textContent=countParts.join('   ');
        const mediaWrap=el.querySelector('.media');
        (post.media||[]).forEach(item=>{const type=((item&&item.type)||'').toLowerCase(); const rawUrl=(typeof item==='string')?item:((item&&(item.url||item.preview_url||item.remote_url))||''); const url=normalizeMediaUrl(rawUrl); if(!url) return; if(type.includes('video') || /\.mp4(\?|$)/i.test(url)){const v=document.createElement('video'); v.src=url; v.controls=true; v.preload='none'; mediaWrap.appendChild(v);} else {const img=document.createElement('img'); img.src=url; img.alt='post media'; img.loading='lazy'; mediaWrap.appendChild(img);} });
        el.querySelector('.origin-link').href=post.url||post.status_url||'https://www.trumpstruth.org/';postsEl.appendChild(el);}catch(err){console.error('render post failed', err, post);}});}
    async function refresh(){try{const resp=await fetch(FEED,{cache:'no-store'});if(!resp.ok) throw new Error(`HTTP ${resp.status}`);const data=await resp.json();if(!data.ok) throw new Error(data.error||'unknown error');errorBox.style.display='none';statusPill.textContent=`最近更新 ${timeAgo(data.fetchedAt)}`;render(data.posts||[]);}catch(err){errorBox.textContent='当前内容更新稍慢，请稍后刷新重试';errorBox.style.display='block';}}
    bindLangToggle(); refresh(); setInterval(refresh,REFRESH_MS);
  </script>
</body>
</html>
