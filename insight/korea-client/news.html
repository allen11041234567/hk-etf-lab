<!doctype html>
<html lang='zh-CN'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <meta name='robots' content='noindex,nofollow,noarchive' />
  <title>韩国市场全部资讯</title>
  <style>
    :root{--bg:#f3f6fb;--panel:#ffffff;--text:#0f172a;--muted:#64748b;--line:#dbe3ef;--brand:#0f766e;--shadow:0 18px 42px rgba(15,23,42,.08)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#f8fbff 0%,#eef3f9 100%);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:24px 16px 40px} .panel{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)}
    .back{display:inline-block;margin-bottom:12px;color:#2563eb;text-decoration:none;font-size:14px;font-weight:800} h1{margin:0 0 10px;font-size:34px} .sub{color:var(--muted);font-size:14px;line-height:1.8}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:10px 0 14px} .status{font-size:12px;color:var(--muted)} .btn{border:none;background:#0f766e;color:#fff;padding:10px 14px;border-radius:999px;font-size:13px;font-weight:800;cursor:pointer}
    .news-list{display:grid;gap:0} .news-item{display:grid;grid-template-columns:72px 110px 1fr;gap:12px;align-items:flex-start;padding:14px 0;border-bottom:1px dashed var(--line)} .news-item:last-child{border-bottom:none;padding-bottom:0}
    .news-time{font-size:12px;color:var(--muted)} .news-source-wrap{display:grid;gap:6px} .news-source{font-size:12px;color:var(--brand);font-weight:800} .news-cat{display:inline-flex;align-items:center;justify-content:center;width:max-content;padding:4px 8px;border-radius:999px;background:#eef4ff;color:#1d4ed8;font-size:11px;font-weight:800} .news-title{font-size:15px;font-weight:800;line-height:1.65;margin-bottom:6px} .news-title a{text-decoration:none} .news-body{font-size:12px;color:#64748b;line-height:1.72} .news-body strong{color:#334155}
    @media (max-width:620px){h1{font-size:28px}.news-item{grid-template-columns:58px 84px 1fr;gap:8px}}
  </style>
</head>
<body>
  <div class='wrap'>
    <div class='panel'>
      <a class='back' href='./index.html'>← 返回韩国市场合作客户观察站</a>
      <h1>韩国市场全部资讯</h1>
      <div class='sub'>这里稳定保留最近 30 到 50 条资讯，按时间倒序展示。首页只放最新 10 条，二级页承担完整资讯池。</div>
      <div class='topbar'><div class='status' id='news-status'>等待首次拉取...</div><button class='btn' id='refresh-news'>立即刷新</button></div>
      <div class='news-list' id='news-list'></div>
    </div>
  </div>
  <script>
    const LIVE_API = '/api/pulse/korea-market-digest';
    const STATIC_JSON = '/assets/data/korea-market-digest.json';
    const STORAGE_KEY = 'korea-market-digest-cache-v2';

    function newsVisible(item) {
      const title = String(item.zhTitle || item.title || '');
      const source = String(item.source || '');
      const badPatterns = [/Airbnb/i,/CNBC Daily Open/i,/India turns/i,/network fees/i,/procurement/i,/personal choice/i,/Woori falls behind/i,/Intel-Tesla tie/i,/Trump Jr/i,/concert/i,/BOJ/i,/Government buying power/i,/targets \$2tr global procurement/i,/From price to strategy/i];
      if (!['Yonhap','Korea Herald'].includes(source)) return false;
      if (badPatterns.some(p => p.test(title))) return false;
      const zhCount = (title.match(/[一-鿿]/g) || []).length;
      if (zhCount < 4) return false;
      return true;
    }

    function renderNews(items) {
      const list = document.getElementById('news-list');
      const rows = items.filter(newsVisible).slice(0, 30).map(item => `
        <article class="news-item">
          <div class="news-time">${item.time || '--:--'}</div>
          <div class="news-source-wrap"><div class="news-source">${item.source || '新闻源'}</div><div class="news-cat">${item.category || '韩国市场'}</div></div>
          <div class="news-main">
            <div class="news-title"><a href="${item.url || '#'}" target="_blank" rel="noopener noreferrer">${item.zhTitle || item.title || '未命名资讯'}</a></div>
            <div class="news-body">${item.summaryZh || '韩国市场增量信息'}</div>
            <div class="news-body">${item.whyZh || ''}</div>
          </div>
        </article>
      `).join('');
      if (rows) list.innerHTML = rows;
    }

    function setStatus(prefix, data) {
      const status = document.getElementById('news-status');
      const ts = data && data.fetchedAt ? new Date(data.fetchedAt).toLocaleString('zh-CN', { hour12:false }) : '';
      status.textContent = ts ? `${prefix}${ts}` : prefix;
    }

    function saveLocal(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (err) {}
    }

    function loadLocal() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (!data || !Array.isArray(data.items) || !data.items.length) return null;
        return data;
      } catch (err) {
        return null;
      }
    }

    async function fetchJson(url) {
      const resp = await fetch(`${url}?t=${Date.now()}`, { cache: 'no-store' });
      if (!resp.ok) throw new Error(`http ${resp.status}`);
      const data = await resp.json();
      if (!data || !data.ok || !Array.isArray(data.items) || !data.items.length) throw new Error('empty');
      return data;
    }

    async function loadLiveNews() {
      const data = await fetchJson(`${location.origin}${LIVE_API}`);
      renderNews(data.items);
      saveLocal(data);
      setStatus('实时更新 ', data);
      return data;
    }

    async function loadStaticNews() {
      const data = await fetchJson(`${location.origin}${STATIC_JSON}`);
      renderNews(data.items);
      saveLocal(data);
      setStatus('本地快照 ', data);
      return data;
    }

    async function refreshNews() {
      try { return await loadLiveNews(); }
      catch (liveErr) {
        try { return await loadStaticNews(); }
        catch (staticErr) {
          const local = loadLocal();
          if (local) {
            renderNews(local.items);
            setStatus('本地缓存 ', local);
            return local;
          }
          throw staticErr;
        }
      }
    }

    async function bootNews() {
      const local = loadLocal();
      if (local) {
        renderNews(local.items);
        setStatus('本地缓存 ', local);
      } else {
        document.getElementById('news-status').textContent = '加载中...';
      }
      try { await refreshNews(); }
      catch (err) { document.getElementById('news-status').textContent = '暂无数据'; }
    }

    document.getElementById('refresh-news').addEventListener('click', refreshNews);
    bootNews();
    setInterval(refreshNews, 300000);
    </script>
</body>
</html>
